<!DOCTYPE html>
<html>

<head>
    <script type="module" src="scripts/register.js"></script>
    <link rel="stylesheet" href="styles/Register.css">
    <title>Register Page</title>
</head>

<body>
    <form name="form">
        <table>

            <tr>
                <td>Username:</td> <td> <input type="text" placeholder="Enter Your Username" name="Username" required> </td>
            </tr>

            <tr>
                <td>Email:</td> <td> <input type="email" placeholder="Enter Your Email" name="Email" required> </td>
            </tr>

            <tr>
                <td>Password:</td> <td> <input type="password" placeholder="Enter Your Password" name="Password" required> </td>
            </tr>

            <tr>
                <td>Confirm-Password:</td> <td> <input type="password" placeholder="Enter Your Confirm-Password" name="Confirm-Password" required> </td>
            </tr>

            <tr>
                <td>Refresh Page:</td> <td> <input type="reset"> </td>
            </tr>

            <tr>
                <td></td> <td> <input type="submit"> </td>
            </tr>
                
        </table>
    </form>
    <div id="error-message" style="display: none; color: red; margin-top: 10px;"></div>
    <div id="success-message" style="display: none; color: green; margin-top: 10px;"></div>
    
    Sign Up Here <br> <a href="login.html">Login</a>
</body>

</html>
